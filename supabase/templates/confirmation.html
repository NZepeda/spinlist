<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Welcome to Spinlist</title>
  </head>
  <body style="margin: 0; background: #f6f1e8; color: #1f1b16; font-family: Arial, sans-serif;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="padding: 32px 16px;">
      <tr>
        <td align="center">
          <table
            role="presentation"
            width="100%"
            cellspacing="0"
            cellpadding="0"
            style="max-width: 560px; overflow: hidden; border: 1px solid #d8cab3; border-radius: 24px; background: #fffdf9;"
          >
            <tr>
              <td style="padding: 40px 32px 20px;">
                <p style="margin: 0 0 16px; font-size: 12px; letter-spacing: 0.24em; text-transform: uppercase; color: #7a6a55;">
                  Spinlist
                </p>
                <h1 style="margin: 0 0 20px; font-size: 32px; line-height: 1.15; color: #1f1b16;">
                  Welcome to Spinlist! We&apos;re excited for you to join the community.
                </h1>
                <p style="margin: 0 0 16px; font-size: 16px; line-height: 1.7; color: #4a4136;">
                  Confirm your email to finish creating your account.
                </p>
                <p style="margin: 0 0 28px; font-size: 16px; line-height: 1.7; color: #4a4136;">
                  Don&apos;t worry, we promise not to spam you. This is just for security.
                </p>
                <table role="presentation" cellspacing="0" cellpadding="0">
                  <tr>
                    <td style="border-radius: 999px; background: #1f1b16;">
                      <a
                        href="{{ .ConfirmationURL }}"
                        style="display: inline-block; padding: 14px 24px; font-size: 16px; font-weight: 700; color: #fffdf9; text-decoration: none;"
                      >
                        Confirm my email
                      </a>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
            <tr>
              <td style="padding: 0 32px 40px;">
                <p style="margin: 0; font-size: 14px; line-height: 1.7; color: #7a6a55;">
                  If you didn&apos;t create this account, you can ignore this email.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
